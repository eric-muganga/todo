spring:
  application:
    name: zadanieRekrutacyjne

  datasource:
    url: jdbc:postgresql://localhost:5432/tododb
    username: todo_user
    password: todo_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-flat-param-object: true